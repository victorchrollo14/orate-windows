name: Windows Release

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

# Don't cancel a release mid-publish.
concurrency:
  group: windows-release
  cancel-in-progress: false

permissions:
  contents: write # create releases / upload installer assets

env:
  PROJECT: Orate/Orate.csproj
  RUNTIME: win-x64
  REPO_URL: https://github.com/victorchrollo14/orate-windows

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Monotonic version so installed clients always see newer releases as updates.
      - name: Compute version
        id: ver
        shell: pwsh
        run: echo "version=1.0.${{ github.run_number }}" >> $env:GITHUB_OUTPUT

      - name: Install Velopack CLI (vpk)
        run: |
          dotnet tool install -g vpk --version 1.2.0
          echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Restore
        run: dotnet restore Orate.sln

      # Self-contained folder publish (NOT single-file — Velopack does its own packaging).
      - name: Publish
        run: >
          dotnet publish ${{ env.PROJECT }}
          -c Release
          -r ${{ env.RUNTIME }}
          --self-contained true
          -p:DebugType=none
          -o publish

      # Pull the previous release so vpk can build a small delta update. The very first
      # release has nothing to download, so don't fail the job on that.
      - name: Download previous release
        continue-on-error: true
        run: vpk download github --repoUrl ${{ env.REPO_URL }} --token ${{ secrets.GITHUB_TOKEN }}

      - name: Pack installer
        run: >
          vpk pack
          --packId Orate
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir publish
          --mainExe Orate.exe
          --packTitle Orate
          --icon Orate/Assets/orate.ico

      # Creates/publishes a GitHub Release (tag v<version>) with Setup.exe + update assets.
      # The app's GithubSource reads these to auto-update silently after install.
      - name: Publish release
        run: >
          vpk upload github
          --repoUrl ${{ env.REPO_URL }}
          --publish
          --releaseName "Orate ${{ steps.ver.outputs.version }}"
          --tag v${{ steps.ver.outputs.version }}
          --token ${{ secrets.GITHUB_TOKEN }}
